<!DOCTYPE html>
<html lang="pt-pt" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Portal do Consultor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tech-blue { color: #3b82f6; }
        .bg-tech-blue { background-color: #3b82f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Sidebar Admin -->
    <aside class="w-64 glass border-r border-white/10 flex-shrink-0 flex flex-col">
        <div class="p-6">
            <img src="/static/img/logo.svg" alt="Logo" class="h-8">
            <span class="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded ml-2">ADMIN</span>
        </div>
        <nav class="flex-grow">
            <div class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Gestão</div>
            <a href="#" class="flex items-center px-6 py-3 bg-white/5 border-l-4 border-blue-500 text-white">
                <i class="fas fa-users mr-3 w-5"></i> Consultores
            </a>
            <a href="#" class="flex items-center px-6 py-3 text-gray-400 hover:text-white">
                <i class="fas fa-box mr-3 w-5"></i> Produtos
            </a>
            <a href="#" class="flex items-center px-6 py-3 text-gray-400 hover:text-white">
                <i class="fas fa-check-double mr-3 w-5"></i> Validar Vendas
            </a>

            <div class="mt-6 px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Financeiro</div>
            <a href="#" class="flex items-center px-6 py-3 text-gray-400 hover:text-white">
                <i class="fas fa-money-bill-wave mr-3 w-5"></i> Pagamentos
            </a>

            <div class="mt-6 px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Suporte</div>
            <a href="#" class="flex items-center px-6 py-3 text-gray-400 hover:text-white">
                <i class="fas fa-comments mr-3 w-5"></i> Tickets <span class="ml-auto bg-blue-600 text-xs px-2 rounded-full">3</span>
            </a>
        </nav>
        <div class="p-4 border-t border-white/10">
            <a href="/logout" class="flex items-center px-6 py-3 text-red-400 hover:text-red-300">
                <i class="fas fa-sign-out-alt mr-3 w-5"></i> Sair
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Gestão de Consultores</h1>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition-all">
                + Novo Consultor
            </button>
        </header>

        <!-- Search & Filter -->
        <div class="glass p-4 rounded-xl mb-6 flex gap-4">
            <input type="text" placeholder="Procurar consultor..." class="flex-grow bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <select class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 outline-none">
                <option>Todos os estados</option>
                <option>Ativos</option>
                <option>Inativos</option>
            </select>
        </div>

        <!-- Table -->
        <div class="glass rounded-2xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-white/5 text-gray-400 text-sm uppercase">
                        <th class="px-6 py-4 font-semibold">Consultor</th>
                        <th class="px-6 py-4 font-semibold">Email</th>
                        <th class="px-6 py-4 font-semibold">Vendas</th>
                        <th class="px-6 py-4 font-semibold">Ganhos</th>
                        <th class="px-6 py-4 font-semibold">Estado</th>
                        <th class="px-6 py-4 font-semibold text-right">Ações</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <tr class="hover:bg-white/5 transition-all">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="w-8 h-8 bg-blue-500 rounded-full mr-3 flex items-center justify-center font-bold text-xs">AS</div>
                                <span class="font-medium">Ana Silva</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-gray-400 text-sm">ana.silva@email.com</td>
                        <td class="px-6 py-4 font-bold">42</td>
                        <td class="px-6 py-4 text-green-400 font-bold">€2,450.00</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 bg-green-500/20 text-green-500 rounded text-xs font-bold uppercase">Ativo</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button class="text-gray-400 hover:text-white mr-3"><i class="fas fa-edit"></i></button>
                            <button class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
